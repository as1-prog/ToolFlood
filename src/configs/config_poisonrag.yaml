# Simple configuration for the black-box PoisonRAG attack.
poisonrag_attack:
  # Where benign ToolBench-style data (tools.json, tasks/, etc.) lives.
  benign_data_directory: "./data/ToolE"

  # Where to write PoisonRAG outputs (attacker tools, merged tools, metrics).
  output_directory: "./experiment_output_poisonrag_blackbox_toole"

  # Number of poisoned tools to generate per training query.
  tools_per_query: 1

  # Maximum number of training queries used to craft poisons.
  # Set to null to use all available train queries.
  max_train_queries: 100

  # Embedding used by the attacker (and to score poisons against queries).
  # Must be a key from the `embeddings` section above.
  embedding_model: "text-embedding-3-small"

  # Victim-side configuration (kept explicit here to mirror ToolFlood's
  # threat model, though code keeps things simple and uses a single model
  # pair instead of full grids).
  victim_embedding_model: "text-embedding-3-small"
  victim_model: "gpt-4o-mini"

  # LLM generator for creating the I (generation text) component.
  # If not specified, defaults to victim_model.
  # Must be a key from the `models` section above.
  generator_model: "gpt-4o-mini" # e.g., "gpt-4o-mini"

  # Maximum number of trials to generate valid I component.
  max_trials: 3

  # Target length (in words) for generated I component.
  text_length: 20

  # Temperature for LLM generation (if generator_model is specified).
  temperature: 1.0

  # Relevance filter: generated tool descriptions must be semantically close
  # to the query (cosine distance in embedding space).
  # Smaller is stricter; if you see too many failed generations, increase it.
  relevance_max_cosine_distance: 0.35


experiment:
  # Same benign data directory as above; kept separate so you can re-use
  # this config shape with other runners if desired.
  benign_data_directory: "./data/ToolE"

  # Output directory is primarily controlled by poisonrag_attack.output_directory.
  # This field is still required by the shared ExperimentConfig.
  output_directory: "./experiment_output_poisonrag_blackbox_toole"

  # Maximum number of test queries to evaluate on.
  max_test_queries: 50

  # How many tools the victim agent retrieves per query.
  # Legacy fallback for agent retrieval depth.
  # Prefer setting `agent.top_k` below.
  max_train_evaluation_queries: 5

  # Optional subset of task names from the ToolBench tasks/ folder.
  # If set to null or omitted, all tasks will be processed individually.
  # Each task will have its own output directory.
  # Example for specific tasks:
  # task_names:
  #   - "Air quality monitoring"
  #   - "Email validation and deliverability"
  task_names: null
  # To process all tasks automatically, set to null:
  # task_names: null

  # These fields are part of the shared ExperimentConfig but are not used
  # by the PoisonRAG runner except for shape compatibility.
  victim_models: ["gpt-4o-mini","gpt-4o","gpt-5-mini"]
  attack_embedding_models: ["text-embedding-3-small"]
  victim_embedding_models: ["text-embedding-3-small"]
  hard_reset: true

agent:
  # Number of top tools to retrieve per query.
  # This controls the "k" used when computing TDR / Mean Domination.
  top_k: 5
  verbose: true

